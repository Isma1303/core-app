# React App
# Build a general React Vite project with npm.

trigger:
  branches:
    include:
      - master

pool:
  vmImage: ubuntu-latest

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
    displayName: 'Install Node'

  - task: DownloadSecureFile@1
    name: devextremeLicense
    inputs:
      secureFile: 'devextreme-license.ts'

  - script: |
      mkdir -p src
      mv $(devextremeLicense.secureFilePath) devextreme-license.ts
    displayName: 'Place devextreme-license.ts in root folder'

  - script: |
      npm install
    displayName: 'Install dependencies'

  - script: |
      npm run build
    displayName: 'Build Vite Project React App'

  - task: ArchiveFiles@2
    inputs:
      rootFolderOrFile: '$(System.DefaultWorkingDirectory)/dist'
      includeRootFolder: false
      archiveType: 'zip'
      archiveFile: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
      replaceExistingArchive: true
    displayName: 'Archive build files'

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: '$(Build.ArtifactStagingDirectory)'
      ArtifactName: drop
      publishLocation: 'Container'
    displayName: 'Publish build artifacts'